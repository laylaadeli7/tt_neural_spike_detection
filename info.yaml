project:
  title:        "Neural Spike Detector"
  author:       "Layla Adeli"
  discord:      ""
  description:  "Adaptive neural spike detector with IIR bandpass filter (300-3000 Hz), Nonlinear Energy Operator (NEO), and EWMA adaptive threshold. Digital backend for neural recording AFEs."
  language:     "Verilog"
  clock_hz: 10000000 
  tiles:        "1x3"
  top_module:   "tt_um_layla_spike_detector"
  source_files:
    - "iir_biquad.v"
    - "neo.v"
    - "noise_estimator.v"
    - "spike_fsm.v"
    - "spi_config.v"
    - "tt_um_layla_spike_detector.v"
pinout:
  ui[0]: "ADC sample bit 0 (LSB)"
  ui[1]: "ADC sample bit 1"
  ui[2]: "ADC sample bit 2"
  ui[3]: "ADC sample bit 3"
  ui[4]: "ADC sample bit 4"
  ui[5]: "ADC sample bit 5"
  ui[6]: "ADC sample bit 6"
  ui[7]: "ADC sample bit 7 (MSB, sign)"
  uo[0]: "Timestamp bit 0 (LSB)"
  uo[1]: "Timestamp bit 1"
  uo[2]: "Timestamp bit 2"
  uo[3]: "Timestamp bit 3"
  uo[4]: "Timestamp bit 4"
  uo[5]: "Timestamp bit 5"
  uo[6]: "Timestamp bit 6 (MSB)"
  uo[7]: "Spike detected (1-cycle pulse)"
  uio[0]: "SPI SCLK (input)"
  uio[1]: "SPI MOSI (input)"
  uio[2]: "SPI CS_n (input, active low)"
  uio[3]: "Debug: filtered signal MSB (output)"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""
yaml_version: 6
